<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1c4a"/>
      <stop offset="100%" stop-color="#080812"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" rx="12" fill="url(#cardGrad)" stroke="#ec4899" stroke-width="1.5"/>
  <text x="20" y="32" fill="#e2e8f0" font-family="system-ui" font-size="16" font-weight="bold">GitHub Trophies</text>
  <rect x="0" y="0" width="400" height="220" fill="url(#shine)" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" from="-400 0" to="400 0" dur="3s" repeatCount="indefinite"/>
  </rect>
  
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.35s" fill="freeze"/>
    <rect x="20" y="50" width="120" height="72" rx="10" fill="#141432" stroke="#00e5ff" stroke-width="1.5"/>
    <text x="80" y="88" fill="#00e5ff" font-family="monospace" font-size="28" font-weight="bold" text-anchor="middle">S</text>
    <text x="80" y="108" fill="#94a3b8" font-family="system-ui" font-size="10" text-anchor="middle">Commits</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.32s" dur="0.35s" fill="freeze"/>
    <rect x="150" y="50" width="120" height="72" rx="10" fill="#141432" stroke="#a855f7" stroke-width="1.5"/>
    <text x="210" y="88" fill="#a855f7" font-family="monospace" font-size="28" font-weight="bold" text-anchor="middle">A</text>
    <text x="210" y="108" fill="#94a3b8" font-family="system-ui" font-size="10" text-anchor="middle">Stars</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.44s" dur="0.35s" fill="freeze"/>
    <rect x="280" y="50" width="120" height="72" rx="10" fill="#141432" stroke="#ec4899" stroke-width="1.5"/>
    <text x="340" y="88" fill="#ec4899" font-family="monospace" font-size="28" font-weight="bold" text-anchor="middle">B+</text>
    <text x="340" y="108" fill="#94a3b8" font-family="system-ui" font-size="10" text-anchor="middle">Repos</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.56s" dur="0.35s" fill="freeze"/>
    <rect x="20" y="135" width="120" height="72" rx="10" fill="#141432" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="80" y="173" fill="#fbbf24" font-family="monospace" font-size="28" font-weight="bold" text-anchor="middle">A</text>
    <text x="80" y="193" fill="#94a3b8" font-family="system-ui" font-size="10" text-anchor="middle">PRs</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.6799999999999999s" dur="0.35s" fill="freeze"/>
    <rect x="150" y="135" width="120" height="72" rx="10" fill="#141432" stroke="#6366f1" stroke-width="1.5"/>
    <text x="210" y="173" fill="#6366f1" font-family="monospace" font-size="28" font-weight="bold" text-anchor="middle">B</text>
    <text x="210" y="193" fill="#94a3b8" font-family="system-ui" font-size="10" text-anchor="middle">Issues</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.35s" fill="freeze"/>
    <rect x="280" y="135" width="120" height="72" rx="10" fill="#141432" stroke="#6366f1" stroke-width="1.5"/>
    <text x="340" y="173" fill="#6366f1" font-family="monospace" font-size="28" font-weight="bold" text-anchor="middle">C</text>
    <text x="340" y="193" fill="#94a3b8" font-family="system-ui" font-size="10" text-anchor="middle">Followers</text>
  </g>
</svg>