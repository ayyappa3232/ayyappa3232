<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1c4a"/>
      <stop offset="100%" stop-color="#080812"/>
    </linearGradient>
    <filter id="s3d"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.4"/></filter>
  </defs>
  <rect width="400" height="220" rx="12" fill="url(#cardGrad)" stroke="#00e5ff" stroke-width="1.5" filter="url(#s3d)"/>
  <text x="24" y="36" fill="#e2e8f0" font-family="system-ui" font-size="16" font-weight="bold">Ayyappa's GitHub Stats</text>
  <circle cx="360" cy="36" r="22" fill="none" stroke="#a855f7" stroke-width="3" stroke-dasharray="100" stroke-dashoffset="100">
    <animate attributeName="stroke-dashoffset" from="100" to="25" dur="1.5s" fill="freeze"/>
  </circle>
  <text x="360" y="41" fill="#fbbf24" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">B+</text>
  
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.4s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="-30 0" to="0 0" begin="0.3s" dur="0.4s" fill="freeze"/>
    <text x="24" y="100" fill="#94a3b8" font-family="system-ui" font-size="13">Total Stars Earned</text>
    <text x="360" y="100" fill="#00e5ff" font-family="monospace" font-size="14" font-weight="bold" text-anchor="end">0</text>
    <line x1="24" y1="108" x2="360" y2="108" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.4s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="-30 0" to="0 0" begin="0.5s" dur="0.4s" fill="freeze"/>
    <text x="24" y="136" fill="#94a3b8" font-family="system-ui" font-size="13">Total Commits</text>
    <text x="360" y="136" fill="#00e5ff" font-family="monospace" font-size="14" font-weight="bold" text-anchor="end">25</text>
    <line x1="24" y1="144" x2="360" y2="144" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.4s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="-30 0" to="0 0" begin="0.7s" dur="0.4s" fill="freeze"/>
    <text x="24" y="172" fill="#94a3b8" font-family="system-ui" font-size="13">Public Repos</text>
    <text x="360" y="172" fill="#00e5ff" font-family="monospace" font-size="14" font-weight="bold" text-anchor="end">6</text>
    <line x1="24" y1="180" x2="360" y2="180" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.9000000000000001s" dur="0.4s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="-30 0" to="0 0" begin="0.9000000000000001s" dur="0.4s" fill="freeze"/>
    <text x="24" y="208" fill="#94a3b8" font-family="system-ui" font-size="13">Pull Requests</text>
    <text x="360" y="208" fill="#00e5ff" font-family="monospace" font-size="14" font-weight="bold" text-anchor="end">0</text>
    <line x1="24" y1="216" x2="360" y2="216" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
  </g>
</svg>